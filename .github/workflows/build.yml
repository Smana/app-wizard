name: Build image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository_owner }}/app-wizard

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        # Not needed for PR builds (they don't push), and a fork PR has no push token.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Application version (Dockerfile ARG)
        id: appver
        run: |
          # The image's own version, published as an immutable semver tag.
          V=$(grep -oP 'ARG APP_WIZARD_VERSION=\K[^\s]+' Dockerfile | head -1 || echo "")
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=ref,event=pr
            # <branch>-<sha> is what deployments pin to; {{branch}} is only set on
            # push/dispatch, so gate it off pull_request (else it renders "-<sha>").
            type=sha,prefix={{branch}}-,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.appver.outputs.version }},enable=${{ steps.appver.outputs.version != '' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Trivy scan (pushed image)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy results
        # Best-effort: uploading SARIF to the Security tab needs code scanning,
        # which a private repo only has with GitHub Advanced Security. Don't fail
        # the build when it's unavailable (it works once the repo is public).
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-app-wizard
